name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies and linting tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff mypy bandit

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy src/kontomierz_mcp/ --disallow-any-generics --disallow-subclassing-any --disallow-untyped-calls --disallow-untyped-defs --disallow-incomplete-defs --check-untyped-defs --warn-redundant-casts --warn-unused-ignores --no-implicit-reexport --strict-equality --extra-checks

      - name: bandit
        run: bandit -r src/kontomierz_mcp/ -ll --skip B104

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=kontomierz_mcp \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  docker-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: kontomierz-mcp:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — REST API health + tools
        run: |
          docker run -d --rm \
            -p 9102:9102 \
            -e MCP_UNSAFE_PUBLIC_ACCESS_CONFIRMED=1 \
            --name kontomierz-mcp-smoke kontomierz-mcp:test
          sleep 5
          curl -fsS --retry 10 --retry-delay 2 \
            http://localhost:9102/api/health || exit 1
          TOOLS=$(curl -s http://localhost:9102/api/tools \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['total'])")
          [ "$TOOLS" = "27" ] \
            || (echo "FAIL: expected 27, got $TOOLS" && exit 1)
          docker stop kontomierz-mcp-smoke
